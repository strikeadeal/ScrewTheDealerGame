<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512" height="512">
  <defs>
    <!-- Background radial: mahogany centre fading to felt-dark edges -->
    <radialGradient id="ic512-bg" cx="50%" cy="42%" r="60%">
      <stop offset="0%"   stop-color="#14271e"/>
      <stop offset="55%"  stop-color="#241510"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </radialGradient>

    <!-- Coin face: burnished brass radial -->
    <radialGradient id="ic512-coin" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#e6c878"/>
      <stop offset="40%"  stop-color="#c8a24a"/>
      <stop offset="85%"  stop-color="#8a6d33"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </radialGradient>

    <!-- Inner engraved face: slightly darker, worn -->
    <radialGradient id="ic512-face" cx="42%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#c8a24a"/>
      <stop offset="60%"  stop-color="#8a6d33"/>
      <stop offset="100%" stop-color="#241510"/>
    </radialGradient>

    <!-- Spade engraving: dark into the brass -->
    <linearGradient id="ic512-spade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#241510"/>
      <stop offset="50%"  stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#14271e"/>
    </linearGradient>

    <!-- Rim highlight (top arc) -->
    <linearGradient id="ic512-rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e6c878" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#c8a24a"    stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8a6d33" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Outer glow / shadow around coin -->
    <filter id="ic512-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9"
                    stdDeviation="18"
                    flood-color="#1a1410" flood-opacity="0.85"/>
    </filter>
  </defs>

  <!-- Background fill: solid mahogany (full-bleed, covers iOS rounding) -->
  <rect width="512" height="512" fill="#241510"/>
  <!-- Radial felt/wood wash on top -->
  <rect width="512" height="512" fill="url(#ic512-bg)"/>

  <!-- Coin outer disc (burnished brass) -->
  <circle cx="256" cy="256" r="225.28"
          fill="url(#ic512-coin)"
          filter="url(#ic512-glow)"/>

  <!-- Coin rim highlight arc (top glint) -->
  <circle cx="256" cy="256" r="225.28"
          fill="none"
          stroke="url(#ic512-rim)"
          stroke-width="12.3904"/>

  <!-- Inner coin face (engraved recess) -->
  <circle cx="256" cy="256" r="198.2464"
          fill="url(#ic512-face)"/>

  <!-- Inner rim groove line -->
  <circle cx="256" cy="256" r="198.2464"
          fill="none"
          stroke="#1a1410"
          stroke-width="5.632000000000001"
          stroke-opacity="0.6"/>

  <!-- ── SPADE MOTIF ───────────────────────────────────────────────────── -->
  <!--
    Classic playing-card spade: two mirrored arcs for the top bulges
    + a pointed bottom + a short stem + a small collar.
    Drawn in a normalised 100×110 box then scaled/translated to fit the coin.
  -->
  <g transform="translate(256, 250.9312)
                scale(2.2528)
                translate(-50, -55)">
    <!--
      Spade body: a symmetric shape.
      Two upper lobes (left & right arcs) meeting at the top peak,
      sweeping down to the centre divot at the bottom of the body,
      then converging into the tail.
    -->
    <path d="
      M 50,5
      C 50,5  80,20  80,45
      C 80,62  65,70  50,62
      C 35,70  20,62  20,45
      C 20,20  50,5   50,5
      Z
    "
    fill="url(#ic512-spade)"
    stroke="#8a6d33"
    stroke-width="1"
    stroke-opacity="0.4"/>

    <!-- Bottom lobe (inverted teardrop / tail base) -->
    <path d="
      M 50,62
      C 42,66  34,74  38,84
      C 42,90  58,90  62,84
      C 66,74  58,66  50,62
      Z
    "
    fill="url(#ic512-spade)"
    stroke="#8a6d33"
    stroke-width="1"
    stroke-opacity="0.4"/>

    <!-- Stem + collar (horizontal bar at base) -->
    <rect x="37" y="83" width="26" height="5" rx="2"
          fill="#241510" fill-opacity="0.7"
          stroke="#8a6d33" stroke-width="0.5" stroke-opacity="0.5"/>

    <!-- Subtle inner highlight on spade (gives engraved depth) -->
    <path d="
      M 50,10
      C 50,10  75,24  75,46
      C 75,58  66,65  55,62
    "
    fill="none"
    stroke="#e6c878"
    stroke-width="1.5"
    stroke-opacity="0.18"
    stroke-linecap="round"/>
  </g>

  <!-- ── "STD" MONOGRAM ────────────────────────────────────────────────── -->
  <!-- Engraved below the spade, in Cinzel-style serif caps -->
  <text x="256" y="395.67359999999996"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="'Cinzel', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
        font-size="50"
        font-weight="600"
        letter-spacing="14"
        fill="#241510"
        fill-opacity="0.85">STD</text>
  <!-- Same text, slightly lighter, offset 1px for engraved relief -->
  <text x="256.5" y="394.87359999999995"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="'Cinzel', 'Palatino Linotype', 'Book Antiqua', Georgia, serif"
        font-size="50"
        font-weight="600"
        letter-spacing="14"
        fill="#e6c878"
        fill-opacity="0.55">STD</text>

  <!-- ── Outer decorative ring (tooled edge detail) ─────────────────────── -->
  <circle cx="256" cy="256" r="219.648"
          fill="none"
          stroke="#e6c878"
          stroke-width="2.70336"
          stroke-opacity="0.25"
          stroke-dasharray="9 9"/>
</svg>